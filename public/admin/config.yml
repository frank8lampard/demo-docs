backend:
  name: github
  repo: frank8lampard/demo-docs
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: getting-started
    label: Начало работы
    folder: src/content/docs/getting-started
    create: true
    extension: md
    fields:
      - { name: title, label: Заголовок, widget: string }
      - { name: description, label: Описание, widget: string, required: false }
      - { name: body, label: Содержимое, widget: markdown }

